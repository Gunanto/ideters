services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ideters-web
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "
      if [ ! -x /app/apps/web/node_modules/.bin/next ]; then
        pnpm install --no-frozen-lockfile --lockfile=false;
      fi;
      pnpm dev --hostname 0.0.0.0 --port 3000
      "
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/web:/app/apps/web
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - web_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: ideters-postgres
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ideters-minio
    env_file:
      - .env
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/minio/health/live || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: ideters-minio-init
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$MINIO_BUCKET_COURSE_ASSETS || true &&
      mc mb -p local/$$MINIO_BUCKET_THUMBNAILS || true &&
      mc mb -p local/$$MINIO_BUCKET_EXPORTS || true &&
      exit 0
      "

  redis:
    image: redis:7-alpine
    container_name: ideters-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: ideters-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  adminer:
    image: adminer:latest
    container_name: ideters-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  redis_data:
  web_node_modules:
  web_next:
