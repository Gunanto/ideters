<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1800" viewBox="0 0 2200 1800">
  <style>
    .title { font: bold 30px Arial, sans-serif; }
    .subtitle { font: 18px Arial, sans-serif; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
    .header { fill: #e5eefc; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
    .text { font: 16px Arial, sans-serif; fill: #111827; }
    .small { font: 14px Arial, sans-serif; fill: #374151; }
    .line { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .line2 { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <text x="60" y="60" class="title">IDETERS LMS — ERD Diagram</text>
  <text x="60" y="95" class="subtitle">Core schema for courses, syntax templates, quizzes, progress, and files</text>

  <!-- profiles -->
  <rect x="60" y="140" width="310" height="210" class="header"/>
  <text x="80" y="175" class="title" style="font-size:22px;">profiles</text>
  <text x="80" y="210" class="text">PK id uuid</text>
  <text x="80" y="240" class="text">email text</text>
  <text x="80" y="270" class="text">full_name text</text>
  <text x="80" y="300" class="text">global_role text</text>
  <text x="80" y="330" class="text">created_at timestamptz</text>

  <!-- courses -->
  <rect x="470" y="140" width="340" height="260" class="header"/>
  <text x="490" y="175" class="title" style="font-size:22px;">courses</text>
  <text x="490" y="210" class="text">PK id uuid</text>
  <text x="490" y="240" class="text">slug text unique</text>
  <text x="490" y="270" class="text">title text</text>
  <text x="490" y="300" class="text">description text</text>
  <text x="490" y="330" class="text">status text</text>
  <text x="490" y="360" class="text">FK owner_id → profiles.id</text>
  <text x="490" y="390" class="text">created_at timestamptz</text>

  <!-- course_members -->
  <rect x="900" y="140" width="360" height="240" class="header"/>
  <text x="920" y="175" class="title" style="font-size:22px;">course_members</text>
  <text x="920" y="210" class="text">PK id uuid</text>
  <text x="920" y="240" class="text">FK course_id → courses.id</text>
  <text x="920" y="270" class="text">FK user_id → profiles.id</text>
  <text x="920" y="300" class="text">role text</text>
  <text x="920" y="330" class="text">status text</text>
  <text x="920" y="360" class="text">created_at timestamptz</text>

  <!-- modules -->
  <rect x="470" y="470" width="340" height="230" class="header"/>
  <text x="490" y="505" class="title" style="font-size:22px;">modules</text>
  <text x="490" y="540" class="text">PK id uuid</text>
  <text x="490" y="570" class="text">FK course_id → courses.id</text>
  <text x="490" y="600" class="text">title text</text>
  <text x="490" y="630" class="text">position int</text>
  <text x="490" y="660" class="text">created_at timestamptz</text>

  <!-- learning_syntaxes -->
  <rect x="60" y="470" width="330" height="250" class="header"/>
  <text x="80" y="505" class="title" style="font-size:22px;">learning_syntaxes</text>
  <text x="80" y="540" class="text">PK id uuid</text>
  <text x="80" y="570" class="text">name text</text>
  <text x="80" y="600" class="text">slug text unique</text>
  <text x="80" y="630" class="text">description text</text>
  <text x="80" y="660" class="text">schema_json jsonb</text>
  <text x="80" y="690" class="text">is_active boolean</text>

  <!-- activities -->
  <rect x="900" y="470" width="420" height="330" class="header"/>
  <text x="920" y="505" class="title" style="font-size:22px;">activities</text>
  <text x="920" y="540" class="text">PK id uuid</text>
  <text x="920" y="570" class="text">FK module_id → modules.id</text>
  <text x="920" y="600" class="text">FK syntax_id → learning_syntaxes.id nullable</text>
  <text x="920" y="630" class="text">type text</text>
  <text x="920" y="660" class="text">title text</text>
  <text x="920" y="690" class="text">content_markdown text</text>
  <text x="920" y="720" class="text">content_html text</text>
  <text x="920" y="750" class="text">position int / is_published boolean</text>
  <text x="920" y="780" class="text">created_at timestamptz</text>

  <!-- activity_syntax_steps -->
  <rect x="1380" y="470" width="420" height="290" class="header"/>
  <text x="1400" y="505" class="title" style="font-size:22px;">activity_syntax_steps</text>
  <text x="1400" y="540" class="text">PK id uuid</text>
  <text x="1400" y="570" class="text">FK activity_id → activities.id</text>
  <text x="1400" y="600" class="text">step_key text</text>
  <text x="1400" y="630" class="text">label text</text>
  <text x="1400" y="660" class="text">step_type text</text>
  <text x="1400" y="690" class="text">content_markdown text</text>
  <text x="1400" y="720" class="text">content_html text</text>
  <text x="1400" y="750" class="text">position int</text>

  <!-- quizzes -->
  <rect x="900" y="910" width="360" height="280" class="header"/>
  <text x="920" y="945" class="title" style="font-size:22px;">quizzes</text>
  <text x="920" y="980" class="text">PK id uuid</text>
  <text x="920" y="1010" class="text">FK activity_id → activities.id unique</text>
  <text x="920" y="1040" class="text">title text</text>
  <text x="920" y="1070" class="text">instructions_markdown text</text>
  <text x="920" y="1100" class="text">time_limit_minutes int</text>
  <text x="920" y="1130" class="text">max_attempts int</text>
  <text x="920" y="1160" class="text">passing_score numeric</text>

  <!-- quiz_questions -->
  <rect x="1380" y="910" width="400" height="310" class="header"/>
  <text x="1400" y="945" class="title" style="font-size:22px;">quiz_questions</text>
  <text x="1400" y="980" class="text">PK id uuid</text>
  <text x="1400" y="1010" class="text">FK quiz_id → quizzes.id</text>
  <text x="1400" y="1040" class="text">type text</text>
  <text x="1400" y="1070" class="text">question_markdown text</text>
  <text x="1400" y="1100" class="text">question_html text</text>
  <text x="1400" y="1130" class="text">explanation_markdown text</text>
  <text x="1400" y="1160" class="text">points numeric</text>
  <text x="1400" y="1190" class="text">position int</text>

  <!-- quiz_choices -->
  <rect x="1820" y="910" width="320" height="240" class="header"/>
  <text x="1840" y="945" class="title" style="font-size:22px;">quiz_choices</text>
  <text x="1840" y="980" class="text">PK id uuid</text>
  <text x="1840" y="1010" class="text">FK question_id → quiz_questions.id</text>
  <text x="1840" y="1040" class="text">choice_text text</text>
  <text x="1840" y="1070" class="text">choice_html text</text>
  <text x="1840" y="1100" class="text">is_correct boolean</text>
  <text x="1840" y="1130" class="text">position int</text>

  <!-- attempts -->
  <rect x="900" y="1320" width="390" height="290" class="header"/>
  <text x="920" y="1355" class="title" style="font-size:22px;">quiz_attempts</text>
  <text x="920" y="1390" class="text">PK id uuid</text>
  <text x="920" y="1420" class="text">FK quiz_id → quizzes.id</text>
  <text x="920" y="1450" class="text">FK user_id → profiles.id</text>
  <text x="920" y="1480" class="text">started_at timestamptz</text>
  <text x="920" y="1510" class="text">submitted_at timestamptz</text>
  <text x="920" y="1540" class="text">score numeric</text>
  <text x="920" y="1570" class="text">status text</text>
  <text x="920" y="1600" class="text">attempt_no int</text>

  <!-- attempt answers -->
  <rect x="1380" y="1320" width="420" height="290" class="header"/>
  <text x="1400" y="1355" class="title" style="font-size:22px;">quiz_attempt_answers</text>
  <text x="1400" y="1390" class="text">PK id uuid</text>
  <text x="1400" y="1420" class="text">FK attempt_id → quiz_attempts.id</text>
  <text x="1400" y="1450" class="text">FK question_id → quiz_questions.id</text>
  <text x="1400" y="1480" class="text">answer_data jsonb</text>
  <text x="1400" y="1510" class="text">score_awarded numeric</text>
  <text x="1400" y="1540" class="text">is_correct boolean</text>
  <text x="1400" y="1570" class="text">graded_at timestamptz</text>
  <text x="1400" y="1600" class="text">graded_by uuid nullable</text>

  <!-- progress -->
  <rect x="60" y="900" width="360" height="280" class="header"/>
  <text x="80" y="935" class="title" style="font-size:22px;">activity_progress</text>
  <text x="80" y="970" class="text">PK id uuid</text>
  <text x="80" y="1000" class="text">FK user_id → profiles.id</text>
  <text x="80" y="1030" class="text">FK activity_id → activities.id</text>
  <text x="80" y="1060" class="text">status text</text>
  <text x="80" y="1090" class="text">progress_percent numeric</text>
  <text x="80" y="1120" class="text">started_at timestamptz</text>
  <text x="80" y="1150" class="text">completed_at timestamptz</text>

  <rect x="60" y="1280" width="360" height="250" class="header"/>
  <text x="80" y="1315" class="title" style="font-size:22px;">course_progress</text>
  <text x="80" y="1350" class="text">PK id uuid</text>
  <text x="80" y="1380" class="text">FK user_id → profiles.id</text>
  <text x="80" y="1410" class="text">FK course_id → courses.id</text>
  <text x="80" y="1440" class="text">progress_percent numeric</text>
  <text x="80" y="1470" class="text">completed_modules int</text>
  <text x="80" y="1500" class="text">updated_at timestamptz</text>

  <!-- files -->
  <rect x="470" y="900" width="340" height="280" class="header"/>
  <text x="490" y="935" class="title" style="font-size:22px;">files</text>
  <text x="490" y="970" class="text">PK id uuid</text>
  <text x="490" y="1000" class="text">FK course_id → courses.id nullable</text>
  <text x="490" y="1030" class="text">FK activity_id → activities.id nullable</text>
  <text x="490" y="1060" class="text">bucket_name text</text>
  <text x="490" y="1090" class="text">object_path text</text>
  <text x="490" y="1120" class="text">mime_type text</text>
  <text x="490" y="1150" class="text">size_bytes bigint</text>
  <text x="490" y="1180" class="text">created_by uuid</text>

  <!-- relationships -->
  <path d="M370 230 L470 230" class="line"/>
  <path d="M810 240 L900 240" class="line"/>
  <path d="M640 400 L640 470" class="line"/>
  <path d="M390 595 L900 595" class="line2"/>
  <path d="M810 585 L900 585" class="line"/>
  <path d="M1320 615 L1380 615" class="line"/>
  <path d="M1110 800 L1110 910" class="line"/>
  <path d="M1260 1040 L1380 1040" class="line"/>
  <path d="M1780 1040 L1820 1040" class="line"/>
  <path d="M1095 1190 L1095 1320" class="line"/>
  <path d="M1580 1220 L1580 1320" class="line"/>
  <path d="M370 1040 L900 1040" class="line2"/>
  <path d="M370 1410 L470 1410 L470 1030" class="line2"/>
  <path d="M370 210 L900 1450" class="line2"/>
  <path d="M370 210 L60 210" class="line2" visibility="hidden"/>

  <text x="470" y="1685" class="small">Suggested cardinalities: profiles 1-N courses, courses 1-N modules, modules 1-N activities, activities 0/1-1 quizzes, quizzes 1-N questions, questions 0-N choices, quizzes 1-N attempts</text>
</svg>
